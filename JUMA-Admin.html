<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JUMA Admin — Aeropuertos Argentina</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#080C14;--s1:#0D1321;--s2:#111827;--s3:#1C2537;--s4:#243047;--border:#1E2D45;--border2:#2A3F5F;--accent:#0057A8;--accent2:#0073E6;--accent3:#38BDF8;--green:#10B981;--green2:#059669;--red:#EF4444;--amber:#F59E0B;--purple:#8B5CF6;--text:#E2EAF4;--text2:#8FA4C0;--text3:#4A6080;--white:#fff;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--r:10px;--rs:7px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:54px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.tl{display:flex;align-items:center;gap:14px;}
.aa-logo{height:36px;width:auto;object-fit:contain;filter:brightness(10);}
.dv{width:1px;height:28px;background:var(--border2);}
.brand{display:flex;align-items:center;gap:9px;}
.jav{width:30px;height:30px;border-radius:50%;overflow:hidden;border:1.5px solid var(--amber);}
.jav img{width:100%;height:100%;object-fit:cover;}
.bname{font-size:14px;font-weight:700;color:var(--white);}
.bsub{font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:.3px;}
.admin-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:20px;font-size:11px;color:var(--amber);font-weight:600;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sb-sec{padding:16px 14px 6px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;}
.sb-nav{flex:1;overflow-y:auto;padding:0 8px;}
.nitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:var(--sans);}
.nitem:hover{background:var(--s3);color:var(--text);}
.nitem.active{background:rgba(245,158,11,.1);color:var(--amber);}
.nb{margin-left:auto;background:var(--accent);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;font-family:var(--mono);}
.sb-footer{padding:12px;border-top:1px solid var(--border);}
.ucard{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--s3);border-radius:var(--rs);}
.uav{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--amber),#D97706);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}
.uname{font-size:12px;font-weight:600;}
.urole{font-size:10px;color:var(--amber);}
.view{flex:1;display:none;flex-direction:column;overflow:hidden;}
.view.active{display:flex;}
.sv{flex:1;overflow-y:auto;padding:20px;}
.sv::-webkit-scrollbar{width:3px;} .sv::-webkit-scrollbar-thumb{background:var(--border);}
.ptitle{font-size:18px;font-weight:700;margin-bottom:4px;}
.psub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.kpi{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.kv{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;}
.kl{font-size:11px;color:var(--text3);margin-top:5px;}
.kpi.blue .kv{color:var(--accent3);} .kpi.green .kv{color:var(--green);} .kpi.red .kv{color:var(--red);} .kpi.amber .kv{color:var(--amber);}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.cc{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.cc.wide{grid-column:1/-1;}
.ct{font-size:12px;font-weight:600;margin-bottom:12px;}
.cw{position:relative;height:180px;} .cw.tall{height:220px;}
.tcard{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.thdr{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center;}
.tcols{display:grid;grid-template-columns:160px 80px 100px 1fr 90px 80px;padding:7px 16px;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--s1);}
.trow{display:grid;grid-template-columns:160px 80px 100px 1fr 90px 80px;padding:9px 16px;border-bottom:1px solid rgba(30,45,69,.4);font-size:12px;}
.trow:last-child{border-bottom:none;} .trow:hover{background:var(--s3);}
.ttr{font-family:var(--mono);font-size:11px;color:var(--accent3);}
.ts{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;text-transform:uppercase;display:inline-block;}
.ts.aprobado{background:rgba(16,185,129,.12);color:var(--green);}
.ts.rechazado{background:rgba(239,68,68,.1);color:var(--red);}
.tam{font-family:var(--mono);font-size:11px;color:var(--text2);}
.tna{color:var(--text2);font-size:11px;} .tdt{font-size:10px;color:var(--text3);}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;}
.atabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--s1);padding:0 16px;}
.atab{padding:11px 16px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);}
.atab.active{color:var(--amber);border-bottom-color:var(--amber);}
.ac{flex:1;overflow-y:auto;padding:16px;}
.ac::-webkit-scrollbar{width:3px;} .ac::-webkit-scrollbar-thumb{background:var(--border);}
.asec{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;margin:14px 0 8px;}
.asec:first-child{margin-top:0;}
.prow{display:grid;grid-template-columns:1fr 130px;gap:8px;align-items:center;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;}
.plbl{font-size:12px;font-weight:500;} .pmod{font-size:10px;color:var(--text3);margin-top:2px;}
.pw{display:flex;align-items:center;gap:5px;background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;}
.pw span{font-size:11px;color:var(--text3);font-family:var(--mono);}
.pinp{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:13px;width:80px;text-align:right;}
.mrow{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;}
.bs{padding:9px 20px;background:var(--amber);border:none;border-radius:var(--rs);color:var(--bg);font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;}
.bs:hover{background:#D97706;} .bs.full{width:100%;} .bs.blue{background:var(--accent2);color:white;} .bs.red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.saveok{color:var(--green);font-size:11px;margin-top:6px;display:none;text-align:center;}
.icard{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);border-radius:var(--rs);padding:12px;margin-bottom:12px;}
.ititle{font-size:11px;font-weight:700;color:var(--amber);margin-bottom:6px;}
.itext{font-size:11px;color:var(--text2);line-height:1.6;}
.alist{display:flex;flex-direction:column;gap:8px;}
.aitem{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;}
.amail{font-family:var(--mono);font-size:12px;color:var(--text);}
.abadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.abadge.root{background:rgba(245,158,11,.2);color:var(--amber);}
.abadge.admin{background:rgba(56,189,248,.15);color:var(--accent3);}
.bdel{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:0 4px;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
.mo.open{opacity:1;pointer-events:all;}
.md{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);width:420px;padding:24px;transform:translateY(10px);transition:transform .2s;}
.mo.open .md{transform:translateY(0);}
.md h2{font-size:16px;font-weight:700;margin-bottom:12px;}
.mact{display:flex;gap:8px;margin-top:16px;}
.mf{margin-bottom:10px;}
.mf label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;}
.mf input,.mf select{width:100%;background:var(--s3);border:1px solid var(--border2);border-radius:var(--rs);padding:8px 10px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;}
.mf input:focus{border-color:var(--amber);}
.bprim{flex:1;padding:10px;background:var(--amber);border:none;border-radius:var(--rs);color:var(--bg);font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;}
.bsec{flex:1;padding:10px;background:var(--s3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text2);font-family:var(--sans);font-size:13px;cursor:pointer;}
.link{color:var(--accent3);text-decoration:none;font-size:11px;}
strong{font-weight:600;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>

function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function updateBadge(){document.getElementById('reqBadge').textContent=getRegs().length;}

window.onload=()=>{updateBadge();renderDashboard();};

function showView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nitem').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  const renders={dashboard:renderDashboard,registros:renderRegistros,busqueda:renderBusqueda,precios:()=>renderPrecios('camaras'),modelos:renderModelos,sca:renderSCA,admins:renderAdmins,sistema:renderSistema};
  if(renders[id])renders[id]();
}

let charts={};
function renderDashboard(){
  const regs=getRegs();
  const total=regs.length,aprobados=regs.filter(r=>r.estado==='aprobado').length,rechazados=regs.filter(r=>r.estado==='rechazado').length;
  const tasa=total?Math.round(aprobados/total*100):0;
  const monto=regs.filter(r=>r.estado==='aprobado').reduce((s,r)=>s+(r.total||0),0);
  const hAhorradas=rechazados*7.5;
  Object.values(charts).forEach(c=>{try{c.destroy();}catch{}});charts={};
  const empty=total===0?'<div class="empty">No hay requerimientos aún. Cuando los usuarios del bot comiencen a cotizar, las métricas aparecerán acá.</div>':'';
  document.getElementById('dashContent').innerHTML=
    '<div class="ptitle">Dashboard</div>'+
    '<div class="psub">Aeropuertos Argentina · JUMA Bot · '+new Date().toLocaleDateString('es-AR')+'</div>'+
    '<div class="kpi-grid">'+
      '<div class="kpi blue"><div class="kv">'+total+'</div><div class="kl">Total requerimientos</div></div>'+
      '<div class="kpi green"><div class="kv">'+aprobados+'</div><div class="kl">Aprobados</div></div>'+
      '<div class="kpi red"><div class="kv">'+rechazados+'</div><div class="kl">Rechazados</div></div>'+
      '<div class="kpi amber"><div class="kv">'+tasa+'%</div><div class="kl">Tasa aprobación</div></div>'+
    '</div>'+
    '<div class="kpi-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:16px">'+
      '<div class="kpi blue"><div class="kv" style="font-size:20px">USD '+Number(monto).toLocaleString('es-AR')+'</div><div class="kl">Monto total aprobado</div></div>'+
      '<div class="kpi amber"><div class="kv">'+hAhorradas.toFixed(0)+' hs</div><div class="kl">Horas ahorradas (filtros)</div></div>'+
      '<div class="kpi green"><div class="kv">'+Math.round(hAhorradas*50).toLocaleString('es-AR')+'</div><div class="kl">Valor aprox. hs ahorradas (USD)</div></div>'+
    '</div>'+
    (total===0?empty:
      '<div class="cgrid">'+
        '<div class="cc"><div class="ct">Estado</div><div class="cw"><canvas id="cDonut"></canvas></div></div>'+
        '<div class="cc"><div class="ct">Por tipo</div><div class="cw"><canvas id="cTipo"></canvas></div></div>'+
        '<div class="cc wide"><div class="ct">Por aeropuerto</div><div class="cw tall"><canvas id="cAero"></canvas></div></div>'+
      '</div>'
    );
  if(total===0)return;
  Chart.defaults.color='#8FA4C0';Chart.defaults.borderColor='#1E2D45';
  const font={family:"'Inter',sans-serif",size:11};
  charts.donut=new Chart(document.getElementById('cDonut'),{type:'doughnut',data:{labels:['Aprobados','Rechazados'],datasets:[{data:[aprobados,rechazados],backgroundColor:['#10B981','#EF4444'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font,padding:12}}},cutout:'65%'}});
  const tipos={CCTV:0,SCA:0,MIX:0};regs.forEach(r=>{if(tipos[r.tipo]!==undefined)tipos[r.tipo]++;});
  charts.tipo=new Chart(document.getElementById('cTipo'),{type:'bar',data:{labels:Object.keys(tipos),datasets:[{data:Object.values(tipos),backgroundColor:['#0073E6','#8B5CF6','#F59E0B'],borderRadius:5,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font},grid:{color:'rgba(30,45,69,0.5)'}},x:{ticks:{font},grid:{display:false}}}}});
  const am={};regs.forEach(r=>{if(!am[r.aeropuerto])am[r.aeropuerto]={ap:0,re:0};am[r.aeropuerto][r.estado==='aprobado'?'ap':'re']++;});
  const ak=Object.keys(am);
  charts.aero=new Chart(document.getElementById('cAero'),{type:'bar',data:{labels:ak,datasets:[{label:'Aprobados',data:ak.map(k=>am[k].ap),backgroundColor:'#10B981',borderRadius:4,borderWidth:0},{label:'Rechazados',data:ak.map(k=>am[k].re),backgroundColor:'#EF4444',borderRadius:4,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font,padding:12}}},scales:{x:{stacked:true,ticks:{font},grid:{display:false}},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1,font},grid:{color:'rgba(30,45,69,0.5)'}}}}});
}

function renderRegistros(){
  const regs=getRegs().sort((a,b)=>b.tracking.localeCompare(a.tracking));
  let rows=regs.length===0?'<div class="empty">Sin registros aún.</div>':
    '<div class="tcols"><span>N° Seguimiento</span><span>Estado</span><span>Tipo</span><span>Nombre</span><span>Total USD</span><span>Fecha</span></div>'+
    regs.map(r=>'<div class="trow"><span class="ttr">'+r.tracking+'</span><span><span class="ts '+r.estado+'">'+r.estado+'</span></span><span style="font-size:11px;color:var(--text2)">'+r.tipo+'</span><span class="tna">'+(r.nombre||r.descripcion||'—')+'</span><span class="tam">'+(r.total?'USD '+Number(r.total).toLocaleString('es-AR'):'—')+'</span><span class="tdt">'+(r.fecha||'—')+'</span></div>').join('');
  document.getElementById('registrosContent').innerHTML=
    '<div class="ptitle">Historial de Requerimientos</div>'+
    '<div class="psub">Todos los requerimientos registrados por JUMA Bot</div>'+
    '<div class="tcard"><div class="thdr"><span>'+regs.length+' registros</span><button class="bs" onclick="exportCSV()">⬇ Exportar CSV</button></div>'+rows+'</div>';
}

function exportCSV(){
  const regs=getRegs();
  const h=['Tracking','Solicitante','Rol','Aeropuerto','Tipo','Nombre','Descripcion','Presupuesto','Total','Estado','Fecha'];
  const rows=regs.map(r=>[r.tracking,r.solicitante,r.rol,r.aeropuerto,r.tipo,r.nombre||'',r.descripcion||'',r.presupuesto||'',r.total||'',r.estado,r.fecha||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='JUMA_Registros_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

function switchPTab(tab,btn){document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderPrecios(tab);}

function renderPrecios(tab){
  const cat=getCatalog();const cont=document.getElementById('preciosContent');
  const saveBtn='<button class="bs full" onclick="savePrices()">💾 Guardar precios</button><div class="saveok" id="saveOk">✓ Guardado</div>';
  if(tab==='camaras'){
    cont.innerHTML='<div class="asec">Cámaras AXIS</div>'+
      cat.camaras.map(c=>'<div class="prow"><div><div class="plbl">'+c.serie+' — '+c.label+'</div><div class="pmod">'+c.models.join(' / ')+'</div></div><div class="pw"><span>USD</span><input class="pinp" data-id="'+c.id+'" data-type="camaras" type="number" value="'+c.price+'" min="0"></div></div>').join('')+saveBtn;
  }else if(tab==='licencias'){
    cont.innerHTML='<div class="asec">Licencias VMS</div>'+
      cat.licencias.map(l=>'<div class="prow"><div><div class="plbl">'+l.label+'</div><div class="pmod">'+l.model+'</div></div><div class="pw"><span>USD</span><input class="pinp" data-id="'+l.id+'" data-type="licencias" type="number" value="'+l.price+'" min="0"></div></div>').join('')+saveBtn;
  }else if(tab==='sca_precios'){
    cont.innerHTML='<div class="asec">Componentes SCA</div>'+
      cat.sca.map(g=>g.componentes.map((comp,i)=>'<div class="prow"><div><div class="plbl">'+comp.nombre+'</div><div class="pmod">Grupo: '+g.label+'</div></div><div class="pw"><span>USD</span><input class="pinp" data-group="'+g.id+'" data-comp="'+i+'" data-type="sca" type="number" value="'+comp.price+'" min="0"></div></div>').join('')).join('')+saveBtn;
  }
}

function savePrices(){
  const cat=getCatalog();
  document.querySelectorAll('.pinp').forEach(inp=>{
    const val=parseFloat(inp.value)||0,type=inp.dataset.type;
    if(type==='camaras'){const it=cat.camaras.find(c=>c.id===inp.dataset.id);if(it)it.price=val;}
    else if(type==='licencias'){const it=cat.licencias.find(l=>l.id===inp.dataset.id);if(it)it.price=val;}
    else if(type==='sca'){const g=cat.sca.find(g=>g.id===inp.dataset.group);if(g)g.componentes[parseInt(inp.dataset.comp)].price=val;}
  });
  saveCatalog(cat);
  const ok=document.getElementById('saveOk');if(ok){ok.style.display='block';setTimeout(()=>ok.style.display='none',2500);}
}

function renderAdmins(){
  const admins=getAdmins();
  document.getElementById('adminsContent').innerHTML=
    '<div class="ptitle">Administradores</div>'+
    '<div class="psub">Usuarios con acceso al panel JUMA Admin</div>'+
    '<div class="icard"><div class="ititle">ℹ Como funciona</div><div class="itext">Los usuarios de esta lista tienen acceso al panel de administración. El usuario root (<strong>'+ROOT_ADMIN+'</strong>) siempre tiene acceso total y no puede ser eliminado. Para que el acceso sea efectivo en producción, también configurá los permisos del archivo JUMA-Admin.html en SharePoint.</div></div>'+
    '<div class="alist">'+admins.map(a=>'<div class="aitem"><span class="amail">'+a.mail+'</span><span class="abadge '+a.rol+'">'+(a.rol==='root'?'⚡ Root':'👤 Admin')+'</span>'+(a.mail!==ROOT_ADMIN?'<button class="bdel" onclick="removeAdmin(\''+a.mail+'\')">✕</button>':'')+'</div>').join('')+'</div>'+
    '<button class="bs blue" style="margin-top:12px;width:100%;" onclick="openM(\'addAdminModal\')">➕ Agregar administrador</button>';
}

function addAdmin(){
  const mail=document.getElementById('newAdminMail').value.trim().toLowerCase();
  const rol=document.getElementById('newAdminRol').value;
  if(!mail||!mail.includes('@')){alert('Mail inválido');return;}
  const admins=getAdmins();
  if(admins.find(a=>a.mail===mail)){alert('Ya es administrador');return;}
  admins.push({mail,rol});saveAdmins(admins);
  closeM('addAdminModal');document.getElementById('newAdminMail').value='';
  renderAdmins();
}

function removeAdmin(mail){
  if(!confirm('¿Eliminar a '+mail+' como administrador?'))return;
  const admins=getAdmins().filter(a=>a.mail!==mail&&a.mail!==ROOT_ADMIN);
  admins.unshift({mail:ROOT_ADMIN,rol:'root'});
  saveAdmins(admins);renderAdmins();
}


function renderBusqueda(){
  const cont=document.getElementById('busquedaContent');
  cont.innerHTML='';
  const wrapper=document.createElement('div');
  wrapper.innerHTML='<div class="ptitle">Búsqueda de Requerimientos</div><div class="psub">Buscá por nombre de persona o número de seguimiento</div>';
  const searchWrap=document.createElement('div');
  searchWrap.style.cssText='display:flex;gap:10px;margin-bottom:16px;';
  const inp=document.createElement('input');
  inp.type='text';inp.id='searchInput';
  inp.placeholder='Ej: Juan García o EZE-000001-CCTV';
  inp.style.cssText='flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;';
  inp.oninput=()=>doSearch(inp.value);
  const btn=document.createElement('button');
  btn.className='bs blue';btn.textContent='Buscar';
  btn.style.cssText='margin-top:0;padding:10px 20px;';
  btn.onclick=()=>doSearch(inp.value);
  searchWrap.appendChild(inp);searchWrap.appendChild(btn);
  const results=document.createElement('div');
  results.id='searchResults';
  results.innerHTML='<div class="empty">Escribí un nombre o número de seguimiento para buscar.</div>';
  cont.appendChild(wrapper);cont.appendChild(searchWrap);cont.appendChild(results);
}

function doSearch(query){
  const q=query.trim().toLowerCase();
  const cont=document.getElementById('searchResults');
  if(!cont)return;
  if(q.length<2){cont.innerHTML='<div class="empty">Escribí al menos 2 caracteres.</div>';return;}

  const regs=getRegs();
  const results=regs.filter(r=>{
    return (r.solicitante||'').toLowerCase().includes(q) ||
           (r.tracking||'').toLowerCase().includes(q) ||
           (r.nombre||'').toLowerCase().includes(q) ||
           (r.aeropuerto||'').toLowerCase().includes(q);
  });

  if(results.length===0){
    cont.innerHTML='<div class="empty">No se encontraron requerimientos para <strong>'+query+'</strong></div>';
    return;
  }

  // Group by solicitante if searching by name
  const byPerson={};
  results.forEach(r=>{
    const key=r.solicitante||'Desconocido';
    if(!byPerson[key])byPerson[key]=[];
    byPerson[key].push(r);
  });

  let html='<div style="font-size:12px;color:var(--text3);margin-bottom:12px">'+results.length+' resultado(s) encontrado(s)</div>';

  Object.entries(byPerson).forEach(([persona,reqs])=>{
    const aprobados=reqs.filter(r=>r.estado==='aprobado').length;
    const rechazados=reqs.filter(r=>r.estado==='rechazado').length;
    const montoTotal=reqs.filter(r=>r.estado==='aprobado').reduce((s,r)=>s+(r.total||0),0);

    html+='<div class="mrow" style="margin-bottom:12px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
        '<div>'+
          '<div style="font-weight:700;font-size:14px">'+persona+'</div>'+
          '<div style="font-size:11px;color:var(--text3);margin-top:2px">'+
            (reqs[0].rol||'—')+' · '+(reqs[0].aeropuerto||'—')+
          '</div>'+
        '</div>'+
        '<div style="display:flex;gap:8px;align-items:center">'+
          '<span style="font-size:11px;background:rgba(16,185,129,.12);color:var(--green);padding:3px 10px;border-radius:5px;font-weight:600">'+aprobados+' aprobados</span>'+
          '<span style="font-size:11px;background:rgba(239,68,68,.1);color:var(--red);padding:3px 10px;border-radius:5px;font-weight:600">'+rechazados+' rechazados</span>'+
          (montoTotal>0?'<span style="font-family:var(--mono);font-size:12px;color:var(--accent3)">USD '+Number(montoTotal).toLocaleString('es-AR')+'</span>':'')+
        '</div>'+
      '</div>'+
      reqs.sort((a,b)=>b.tracking.localeCompare(a.tracking)).map(r=>
        '<div style="display:grid;grid-template-columns:160px 80px 1fr 90px;padding:7px 0;border-top:1px solid rgba(30,45,69,.4);font-size:12px;gap:8px;align-items:center">'+
          '<span style="font-family:var(--mono);font-size:11px;color:var(--accent3)">'+r.tracking+'</span>'+
          '<span><span class="ts '+r.estado+'">'+r.estado+'</span></span>'+
          '<span style="color:var(--text2);font-size:11px">'+( r.nombre||r.descripcion||'—')+'</span>'+
          '<span style="font-family:var(--mono);font-size:11px;color:var(--text2);text-align:right">'+
            (r.total?'USD '+Number(r.total).toLocaleString('es-AR'):'—')+
          '</span>'+
        '</div>'
      ).join('')+
    '</div>';
  });

  cont.innerHTML=html;
}
